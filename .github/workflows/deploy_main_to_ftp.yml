on:
  push:
    branches:
      - main
  workflow_dispatch:

name: Deploy website on main push

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Stažení nejnovějšího kódu z repozitáře
      - name: Get latest code
        uses: actions/checkout@v4

      # 2. Instalace závislostí a build webu
      - name: Build project
        run: |
          yarn install
          yarn build

      # 3. Instalace openconnect, oathtool a připojení k VPN s automatickým 2FA
      - name: Connect to VPN
        run: |
          # Instalace VPN klienta, 2FA generátoru a směrovacího skriptu
          sudo apt-get update
          sudo apt-get install -y openconnect oathtool vpnc-script

          # Vygenerování aktuálního šestimístného kódu (jako z Google Authenticatoru)
          TOKEN=$(oathtool --base32 --totp "${{ secrets.VPN_2FA_SECRET }}")
          
          # Příprava přihlašovacích údajů (heslo na 1. řádku, 2FA kód na 2. řádku)
          printf "%s\n%s\n" "${{ secrets.VPN_PASSWORD }}" "$TOKEN" > vpn-pass.txt

          echo "Spouštím VPN s automatickým 2FA..."
          sudo openconnect \
            --protocol=anyconnect \
            --user=${{ secrets.VPN_USERNAME }} \
            --authgroup=VPN-UTB \
            --script=/usr/share/vpnc-scripts/vpnc-script \
            --passwd-on-stdin < vpn-pass.txt \
            vpn.utb.cz &
          
          echo "Čekám na navázání spojení..."
          sleep 15

          # Kontrola, zda VPN tunel úspěšně vznikl
          if ip a show tun0; then
            echo "VPN připojení bylo úspěšně navázáno."
          else
            echo "Chyba: Nepodařilo se vytvořit VPN tunel!"
            exit 1
          fi

      # 4. Nahrání souborů přes SFTP do univerzitní sítě
      - name: Sync files  
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.FTP }}  
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: './dist/' 
          remoteDir: './www/' 
          exclude: '.git*,**/.git*,**/.git*/**,**/.idea*,**/.idea*/**.DS_Store'
