on:
  push:
    branches:
      - main
  workflow_dispatch:

name: Deploy website on main push

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Stažení nejnovějšího kódu z repozitáře
      - name: Get latest code
        uses: actions/checkout@v4

      # 2. Instalace závislostí a build webu
      - name: Build project
        run: |
          yarn install
          yarn build

      # 3. Připojení k EXTERNÍ VPN a SFTP nahrávání
      - name: Connect to VPN and Deploy
        run: |
          # Instalace potřebných balíčků včetně lftp nahrávače
          sudo apt-get update
          sudo apt-get install -y openconnect oathtool vpnc-scripts lftp

          # Vygenerování aktuálního šestimístného 2FA kódu z nového klíče
          TOKEN=$(oathtool --base32 --totp "${{ secrets.VPN_2FA_SECRET }}")
          
          # Příprava přihlašovacích údajů pro VPN (nový externí účet)
          printf "%s\n%s\n" "${{ secrets.VPN_PASSWORD }}" "$TOKEN" > vpn-pass.txt

          echo "Spouštím VPN s EXTERNÍM účtem na pozadí..."
          sudo openconnect \
            --protocol=anyconnect \
            --user=${{ secrets.VPN_USERNAME }} \
            --authgroup=VPN-UTB \
            --script=/usr/share/vpnc-scripts/vpnc-script \
            --passwd-on-stdin vpn.utb.cz < vpn-pass.txt &
          
          echo "Čekám 10 sekund na sestavení tunelu..."
          sleep 10

          echo "Spouštím SFTP synchronizaci na loony.utb.cz..."
          # Připojujeme se přímo na IP adresu, kterou povolilo IT oddělení
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://195.178.88.158 -e "
            set sftp:auto-confirm yes;
            mirror -R --delete --exclude-glob .git* --exclude-glob .idea* ./dist/ ./www/;
            quit
          "
          
          echo "Web byl úspěšně aktualizován přes externí VPN!"
