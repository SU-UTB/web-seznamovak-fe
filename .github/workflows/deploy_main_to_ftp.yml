on:
  push:
    branches:
      - main
  workflow_dispatch:

name: Deploy website on main push

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Aktualizováno na v4
      - name: Get latest code
        uses: actions/checkout@v4

      # 2. Instalace závislostí a build
      - name: Build project
        run: |
          yarn install
          yarn build

      # 3. Instalace a připojení k VPN (Zde vynutíme přežití procesu)
      - name: Connect to VPN
        run: |
          # Instalace VPN klienta, 2FA generátoru a směrovacích skriptů
          sudo apt-get update
          sudo apt-get install -y openconnect oathtool vpnc-scripts

          # Vygenerování aktuálního 2FA kódu
          TOKEN=$(oathtool --base32 --totp "${{ secrets.VPN_2FA_SECRET }}")

          # Příprava přihlašovacích údajů (heslo na 1. řádek, 2FA kód na 2. řádek)
          printf "%s\n%s\n" "${{ secrets.VPN_PASSWORD }}" "$TOKEN" > vpn-pass.txt
          
          echo "Spouštím VPN..."
          # Nastavením RUNNER_TRACKING_ID="" zakážeme GitHubu zabít VPN na konci tohoto kroku
          export RUNNER_TRACKING_ID=""
          
          sudo openconnect \
            --protocol=anyconnect \
            --user=${{ secrets.VPN_USERNAME }} \
            --authgroup=VPN-UTB \
            --script=/usr/share/vpnc-scripts/vpnc-script \
            --passwd-on-stdin vpn.utb.cz < vpn-pass.txt &
          
          echo "Čekám na navázání spojení..."
          sleep 15

          # Rychlé ověření existence tunelu
          if ip a show tun0; then
            echo "VPN je připravena pro SFTP krok!"
          else
            echo "Varování: Tunel tun0 nebyl včas detekován, pokračuji dál."
          fi

      # 4. Nahrání souborů přes SFTP (Vaše původní akce)
      - name: Sync files  
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.FTP }}  # Zde doporučuji mít IP adresu 195.178.88.158
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: './dist/' 
          remoteDir: './www/' 
          exclude: '.git*,**/.git*,**/.git*/**,**/.idea*,**/.idea*/**.DS_Store'
