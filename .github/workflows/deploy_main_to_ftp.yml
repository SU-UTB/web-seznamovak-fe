on:
  push:
    branches:
      - main
  workflow_dispatch:

name: Deploy website on main push

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Stažení nejnovějšího kódu z repozitáře
      - name: Get latest code
        uses: actions/checkout@v4

      # 2. Instalace závislostí a build webu
      - name: Build project
        run: |
          yarn install
          yarn build

      # 3. Připojení k VPN a OKAMŽITÉ nahrání přes SFTP
      - name: Connect to VPN and Deploy
        run: |
          # Instalace VPN klienta, 2FA generátoru, směrování a SFTP klienta (lftp)
          sudo apt-get update
          sudo apt-get install -y openconnect oathtool vpnc-scripts lftp

          # Vygenerování aktuálního šestimístného 2FA kódu
          TOKEN=$(oathtool --base32 --totp "${{ secrets.VPN_2FA_SECRET }}")
          
          # Příprava přihlašovacích údajů pro VPN
          printf "%s\n%s\n" "${{ secrets.VPN_PASSWORD }}" "$TOKEN" > vpn-pass.txt

          echo "Spouštím VPN s automatickým 2FA (neinteraktivně)..."
          # Přesměrováváme logy do vpn.log, abychom viděli případné chyby na pozadí
          sudo openconnect \
            --protocol=anyconnect \
            --user=${{ secrets.VPN_USERNAME }} \
            --authgroup=VPN-UTB \
            --script=/usr/share/vpnc-scripts/vpnc-script \
            --non-inter \
            --no-xmlpost \
            --passwd-on-stdin < vpn-pass.txt \
            vpn.utb.cz > vpn.log 2>&1 &
          
          echo "Čekám na navázání stabilního spojení..."
          sleep 15

          # Výpis logu VPN pro kontrolu úspěšného spojení
          cat vpn.log

          # Kontrola, zda VPN tunel úspěšně vznikl
          if ip a show tun0; then
            echo "VPN připojení je aktivní. Spouštím SFTP synchronizaci..."
            
            # Nahrání souborů pomocí nástroje lftp přímo uvnitř tohoto kroku
            lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP }} -e "
              set sftp:auto-confirm yes;
              mirror -R --delete --exclude-glob .git* --exclude-glob .idea* ./dist/ ./www/;
              quit
            "
            
            echo "Synchronizace úspěšně dokončena!"
          else
            echo "Chyba: Nepodařilo se vytvořit VPN tunel!"
            exit 1
          fi
